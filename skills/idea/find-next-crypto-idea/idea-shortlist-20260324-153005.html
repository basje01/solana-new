<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Find Next Crypto Idea</title>
    <style>
      :root {
        --bg: #f5f0e8;
        --panel: rgba(255, 252, 247, 0.92);
        --panel-strong: #fffaf2;
        --ink: #17120b;
        --muted: #5e5346;
        --line: rgba(23, 18, 11, 0.12);
        --accent: #c2551a;
        --accent-soft: rgba(194, 85, 26, 0.12);
        --success: #235c33;
        --warn: #8b5b12;
        --shadow: 0 18px 50px rgba(40, 28, 18, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(194, 85, 26, 0.12), transparent 28%),
          radial-gradient(circle at right 20%, rgba(35, 92, 51, 0.1), transparent 22%),
          linear-gradient(180deg, #f9f5ed 0%, var(--bg) 100%);
      }

      .shell {
        width: min(1160px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 32px 0 56px;
      }

      .hero,
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 24px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
      }

      .hero {
        padding: 28px;
      }

      .hero h1 {
        margin: 0 0 10px;
        font-size: clamp(2rem, 4vw, 3.4rem);
        line-height: 0.94;
        max-width: 9ch;
      }

      .hero p {
        margin: 0;
        max-width: 60ch;
        color: var(--muted);
        font-size: 1rem;
      }

      .hero-meta {
        margin-top: 18px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        padding: 8px 12px;
        font-size: 0.9rem;
      }

      .grid {
        display: grid;
        grid-template-columns: 1.05fr 1.4fr;
        gap: 20px;
        margin-top: 20px;
      }

      .panel {
        padding: 22px;
      }

      .panel h2,
      .panel h3 {
        margin: 0 0 14px;
        font-family: "Avenir Next Condensed", "Franklin Gothic Medium", sans-serif;
        letter-spacing: 0.02em;
      }

      .panel h2 {
        font-size: 1.25rem;
      }

      .meta-list,
      .idea-list,
      .checklist,
      .risk-list,
      .timeline {
        display: grid;
        gap: 12px;
      }

      .meta-item,
      .answer-item,
      .check-item,
      .risk-item,
      .timeline-item,
      .comp-item {
        padding: 14px 16px;
        border-radius: 18px;
        background: var(--panel-strong);
        border: 1px solid var(--line);
      }

      .meta-item strong,
      .answer-item strong,
      .risk-item strong,
      .timeline-item strong,
      .comp-item strong {
        display: block;
        font-family: "Avenir Next Condensed", "Franklin Gothic Medium", sans-serif;
        margin-bottom: 6px;
      }

      .idea-card {
        padding: 18px;
        border-radius: 22px;
        background: var(--panel-strong);
        border: 1px solid var(--line);
        display: grid;
        gap: 14px;
      }

      .idea-card.winner {
        border-color: rgba(194, 85, 26, 0.4);
        box-shadow: inset 0 0 0 1px rgba(194, 85, 26, 0.16);
      }

      .idea-head {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: start;
      }

      .idea-head h3 {
        margin: 0;
        font-size: 1.35rem;
      }

      .idea-sub {
        color: var(--muted);
      }

      .badge {
        border-radius: 999px;
        padding: 7px 10px;
        background: rgba(23, 18, 11, 0.06);
        font-size: 0.84rem;
        white-space: nowrap;
      }

      .badge.winner {
        background: var(--accent);
        color: white;
      }

      .section-stack {
        display: grid;
        gap: 10px;
      }

      .section-stack h4 {
        margin: 0;
        font-family: "Avenir Next Condensed", "Franklin Gothic Medium", sans-serif;
        letter-spacing: 0.02em;
      }

      .section-stack p,
      .section-stack ul {
        margin: 0;
        color: var(--muted);
      }

      .section-stack ul {
        padding-left: 18px;
      }

      .score-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .score {
        border-radius: 12px;
        padding: 8px 10px;
        background: rgba(35, 92, 51, 0.08);
        color: var(--success);
        font-size: 0.88rem;
      }

      .wide {
        margin-top: 20px;
      }

      .footer-note {
        margin-top: 20px;
        color: var(--muted);
        font-size: 0.92rem;
      }

      @media (max-width: 900px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <h1 id="report-title"></h1>
        <p id="report-subtitle"></p>
        <div class="hero-meta" id="hero-meta"></div>
      </section>

      <section class="grid">
        <article class="panel">
          <h2>User Context</h2>
          <div class="meta-list" id="context-summary"></div>
        </article>

        <article class="panel">
          <h2>Clarifying Answers</h2>
          <div class="meta-list" id="clarifying-answers"></div>
        </article>
      </section>

      <section class="panel wide">
        <h2>Top 3 Ideas</h2>
        <div class="idea-list" id="ideas"></div>
      </section>

      <section class="panel wide">
        <h2>Why The Winner Wins</h2>
        <div class="meta-list" id="winner-summary"></div>
      </section>

      <p class="footer-note">
        Generated from structured JSON. Offline-safe and meant to be reviewed outside chat.
      </p>
    </main>

    <script>
      const REPORT_DATA = {"report_type": "shortlist", "title": "Find Next Crypto Idea", "generated_at": "2026-03-24T10:00:13Z", "user_context": {"prompt": "What should I build in crypto?", "summary": ["Wants something that can ship in 2 weeks for a hackathon.", "Self-reported strength is backend and infrastructure work.", "Interested in onchain agents rather than a broader crypto category.", "Has no clear first-user set or distribution edge yet.", "Asked for the best underlying idea, not just the easiest demo."], "clarifying_answers": [{"question": "What are you actually optimizing for?", "answer": "Ship something in 2 weeks for the hackathon."}, {"question": "What part of crypto do you understand better than random teams?", "answer": "Onchain agents, loosely, but nothing highly specific yet."}, {"question": "What are you strongest at?", "answer": "Backend and infrastructure."}, {"question": "Who are the first users you can reach?", "answer": "Nobody specific yet."}]}, "recommended_winner": "policy-runtime-for-agent-wallets", "ideas": [{"slug": "policy-runtime-for-agent-wallets", "name": "Policy Runtime for Agent Wallets", "rank": 1, "status": "winner", "one_liner": "Compile human rules into enforceable spend, contract, and approval policies for agent wallets, with simulation and audit trails.", "why_it_wins": "This is the best balance of real blocker and buildability. Current stacks already make it easy to give an agent a wallet, but the hard problem is letting it act without feeling reckless. A vendor-neutral policy runtime sits above wallet primitives instead of fighting them.", "why_crypto_is_necessary": "The product only matters because the agent is touching onchain assets and contracts. Remove blockchain and you remove the shared wallet state, signature model, contract allowlists, and public execution trail that make the policy layer valuable.", "kill_this_idea": "Kill it if wallet providers ship enough native policy controls that developers never feel cross-vendor pain, or if most teams are happy with custodial wallets plus manual approvals.", "why_not_web2": "Web2 permission systems can gate API calls, but they do not control onchain spend rights across smart accounts, contracts, and public settlement.", "scores": {"founder_fit": 2, "mvp_speed": 2, "distribution_clarity": 1, "market_pull": 2, "revenue_path": 2}, "competitors": [{"name": "Privy agentic wallets plus policies", "type": "direct", "signal": "Privy docs already expose agentic wallets, policy controls, spending limits, rate limits, and signer management.", "why_they_have_not_won": "Privy is a wallet platform, not a neutral control plane spanning multiple wallet providers and agent runtimes."}, {"name": "Lit Protocol Vincent", "type": "direct", "signal": "Vincent positions policies as programmable guardrails for agent abilities, including spend, rate, and time limits.", "why_they_have_not_won": "It is opinionated around Lit's stack. That leaves room for a thinner runtime focused on simulation, observability, and vendor-agnostic policy execution."}, {"name": "AAWP", "type": "direct", "signal": "AAWP pushes AI-only wallets, guardian protection, and cryptographically bound agent identity.", "why_they_have_not_won": "It is wallet-first. The wedge here is policy and execution control across existing wallets, not another wallet primitive."}, {"name": "Safe plus custom modules", "type": "adjacent substitute", "signal": "Safe's ERC-4337 module stack is the default path for teams willing to wire approvals and policy logic themselves.", "why_they_have_not_won": "It is a substitute, not a complete agent control plane. Teams still need policy authoring, simulations, receipts, and runtime-specific controls."}], "oss_landscape": [{"name": "LIT-Protocol/Vincent", "signal": "34 GitHub stars and 3,439 commits visible on Mar 24, 2026.", "notes": "Proves active open-source demand for policy-governed agent wallets."}, {"name": "Safe modules and ERC-4337 tooling", "signal": "Mature substitute ecosystem with broad smart-account adoption.", "notes": "Useful for the MVP because it reduces wallet infra work, but it also caps differentiation if you stay too generic."}]}, {"slug": "budgeted-x402-gateway", "name": "Budgeted x402 Gateway for Agent Fleets", "rank": 2, "status": "runner-up", "one_liner": "Give every agent and API provider a spend budget, routing layer, retries, and unified receipts across x402-paid services.", "why_it_wins": "Why it survived the cut: it is the fastest thing here to demo cleanly, and it matches a backend builder. Why it lost: the surface is already getting crowded by protocol docs, SDKs, gateways, and marketplace tooling, so the moat is thin unless you own a narrow vertical.", "why_crypto_is_necessary": "The wedge is pay-per-request settlement in stablecoins between software actors. Without crypto, this collapses back into API keys, subscriptions, and centralized billing.", "kill_this_idea": "Kill it if your product is just an x402 wrapper with dashboards. The protocol and its ecosystem are moving quickly enough to commoditize generic gateway UX.", "why_not_web2": "Traditional billing can meter humans and companies, but it is clumsy for autonomous wallets making small cross-service payments without prior contracts.", "scores": {"founder_fit": 2, "mvp_speed": 3, "distribution_clarity": 0, "market_pull": 2, "revenue_path": 1}, "competitors": [{"name": "x402 protocol and SDKs", "type": "direct", "signal": "Official x402 docs already support agent payments, middleware hooks, MCP integration, and payment extensions.", "why_they_have_not_won": "The protocol is not the product, but any generic gateway competes directly with the protocol's reference UX."}, {"name": "Coinbase AgentKit and Base AI Agents stack", "type": "direct", "signal": "Base docs position wallet setup, x402 payments, identity, and discovery as the core AI agent stack.", "why_they_have_not_won": "They are broad platforms. A sharper vertical gateway could still matter, but a generic one is exposed."}, {"name": "A2A x402 Extension", "type": "adjacent substitute", "signal": "Google Agentic Commerce's repo standardizes A2A payment-required and payment-completed flows for agent commerce.", "why_they_have_not_won": "It solves protocol-level interoperability, not budgeting, routing, or team-level spend controls."}, {"name": "XPack MCP Marketplace and similar paid MCP layers", "type": "adjacent substitute", "signal": "Marketplace tooling shows paid agent services are already being packaged and sold.", "why_they_have_not_won": "Centralized marketplaces are not the same as an infrastructure layer inside agent fleets."}], "oss_landscape": [{"name": "google-agentic-commerce/a2a-x402", "signal": "Roughly 378 GitHub stars and updated Nov 12, 2025.", "notes": "Strong signal that paid agent-to-agent request flows are already being standardized."}, {"name": "microchipgnu/MCPay, x402-kit, machinepay", "signal": "Multiple actively updated x402-related repos appeared in GitHub topic results in late 2025.", "notes": "Good for acceleration, bad for differentiation."}]}, {"slug": "escrowed-a2a-settlement", "name": "Escrowed A2A Settlement for Paid Agent Tasks", "rank": 3, "status": "runner-up", "one_liner": "Add conditional settlement, delivery receipts, and dispute hooks to x402 and A2A so agent buyers do not prepay blindly.", "why_it_wins": "Why it survived the cut: the crypto need is strongest here because untrusted agents need shared escrow. Why it lost: market timing is earlier, demand is less proven, and delivery proof is a hard product problem to fake well in two weeks.", "why_crypto_is_necessary": "Without blockchain this becomes a centralized marketplace holding everyone's money. Onchain escrow and conditional release are the whole point.", "kill_this_idea": "Kill it if agent commerce stays inside single platforms, or if simple push payments plus manual refunds are good enough for buyers.", "why_not_web2": "Web2 billing can charge for usage, but it does not give mutually untrusted agents portable escrow, programmable release logic, and auditable receipts.", "scores": {"founder_fit": 2, "mvp_speed": 1, "distribution_clarity": 0, "market_pull": 1, "revenue_path": 2}, "competitors": [{"name": "A2A x402 Extension", "type": "direct", "signal": "It already standardizes payment-required, payment-submitted, and payment-completed flows for agent commerce.", "why_they_have_not_won": "It does not yet solve escrowed execution or proof-of-completion. It mainly proves the payment rail exists."}, {"name": "x402 current exact scheme", "type": "adjacent substitute", "signal": "The official FAQ says the current exact scheme is an irreversible push payment and notes future escrow schemes as a roadmap direction.", "why_they_have_not_won": "That roadmap note is exactly the gap. Buyers still need a safer settlement model for non-trivial agent tasks."}, {"name": "Centralized marketplaces for paid MCP and agent services", "type": "adjacent substitute", "signal": "Centralized platforms can mediate trust and refunds without onchain escrow.", "why_they_have_not_won": "They require trusting the operator and do not give portable settlement guarantees across platforms."}], "oss_landscape": [{"name": "google-agentic-commerce/a2a-x402", "signal": "Active open-source baseline for paid A2A request flows.", "notes": "Useful as a starting point, but it also means your wedge has to be conditional settlement, not plain payments."}, {"name": "AP2 and related agentic commerce specs", "signal": "Google Agentic Commerce's AP2 repo showed about 2.5k stars in current GitHub results.", "notes": "Strong proof that agentic payment standards are moving fast, which helps timing but raises standardization risk."}]}]};

      const qs = (id) => document.getElementById(id);

      function el(tag, className, text) {
        const node = document.createElement(tag);
        if (className) node.className = className;
        if (text !== undefined && text !== null) node.textContent = text;
        return node;
      }

      function appendList(container, items) {
        if (!items || !items.length) return;
        const ul = el("ul");
        items.forEach((item) => ul.appendChild(el("li", "", item)));
        container.appendChild(ul);
      }

      qs("report-title").textContent = REPORT_DATA.title || "Find Next Crypto Idea";
      qs("report-subtitle").textContent =
        REPORT_DATA.report_type === "deep-dive"
          ? "Deep dive on the selected crypto startup idea."
          : "Shortlist of the three most defensible crypto ideas based on the interview and fresh research.";

      const meta = qs("hero-meta");
      [
        REPORT_DATA.report_type || "shortlist",
        REPORT_DATA.generated_at || "",
        REPORT_DATA.recommended_winner ? `winner: ${REPORT_DATA.recommended_winner}` : "",
      ]
        .filter(Boolean)
        .forEach((value) => meta.appendChild(el("span", "chip", value)));

      const summary = qs("context-summary");
      (REPORT_DATA.user_context?.summary || []).forEach((item) => {
        summary.appendChild(el("div", "meta-item", item));
      });
      if (!summary.children.length) {
        summary.appendChild(el("div", "meta-item", "No user context summary provided."));
      }

      const answers = qs("clarifying-answers");
      (REPORT_DATA.user_context?.clarifying_answers || []).forEach((item) => {
        const wrap = el("div", "answer-item");
        wrap.appendChild(el("strong", "", item.question || "Question"));
        wrap.appendChild(el("div", "", item.answer || ""));
        answers.appendChild(wrap);
      });
      if (!answers.children.length) {
        answers.appendChild(el("div", "answer-item", "No clarifying answers captured."));
      }

      const ideasRoot = qs("ideas");
      (REPORT_DATA.ideas || []).forEach((idea) => {
        const card = el("article", `idea-card ${idea.status === "winner" ? "winner" : ""}`.trim());

        const head = el("div", "idea-head");
        const left = el("div");
        left.appendChild(el("h3", "", idea.name || "Untitled idea"));
        left.appendChild(el("div", "idea-sub", idea.one_liner || ""));
        head.appendChild(left);
        head.appendChild(el("span", `badge ${idea.status === "winner" ? "winner" : ""}`.trim(), idea.status || `rank ${idea.rank || ""}`));
        card.appendChild(head);

        const scoreRow = el("div", "score-row");
        Object.entries(idea.scores || {}).forEach(([key, value]) => {
          scoreRow.appendChild(el("span", "score", `${key}: ${value}`));
        });
        if (scoreRow.children.length) card.appendChild(scoreRow);

        const blocks = [
          ["Why it wins", idea.why_it_wins],
          ["Why crypto is necessary", idea.why_crypto_is_necessary],
          ["Kill this idea", idea.kill_this_idea],
          ["Why not Web2", idea.why_not_web2],
        ];
        blocks.forEach(([title, body]) => {
          if (!body) return;
          const wrap = el("section", "section-stack");
          wrap.appendChild(el("h4", "", title));
          wrap.appendChild(el("p", "", body));
          card.appendChild(wrap);
        });

        if ((idea.competitors || []).length) {
          const wrap = el("section", "section-stack");
          wrap.appendChild(el("h4", "", "Competitors and substitutes"));
          const compList = el("div", "meta-list");
          idea.competitors.forEach((item) => {
            const row = el("div", "comp-item");
            row.appendChild(el("strong", "", `${item.name || "Unknown"}${item.type ? ` · ${item.type}` : ""}`));
            if (item.signal) row.appendChild(el("div", "", item.signal));
            if (item.why_they_have_not_won) row.appendChild(el("div", "", `Why they have not won: ${item.why_they_have_not_won}`));
            compList.appendChild(row);
          });
          wrap.appendChild(compList);
          card.appendChild(wrap);
        }

        if ((idea.oss_landscape || []).length) {
          const wrap = el("section", "section-stack");
          wrap.appendChild(el("h4", "", "OSS landscape"));
          const list = el("div", "meta-list");
          idea.oss_landscape.forEach((item) => {
            const row = el("div", "comp-item");
            row.appendChild(el("strong", "", item.name || "Unknown repo"));
            if (item.signal) row.appendChild(el("div", "", item.signal));
            if (item.notes) row.appendChild(el("div", "", item.notes));
            list.appendChild(row);
          });
          wrap.appendChild(list);
          card.appendChild(wrap);
        }

        if ((idea.mvp_checklist || []).length) {
          const wrap = el("section", "section-stack");
          wrap.appendChild(el("h4", "", "2-week MVP"));
          const list = el("div", "checklist");
          idea.mvp_checklist.forEach((item) => {
            list.appendChild(el("div", "check-item", `□ ${item}`));
          });
          wrap.appendChild(list);
          card.appendChild(wrap);
        }

        if ((idea.risks || []).length) {
          const wrap = el("section", "section-stack");
          wrap.appendChild(el("h4", "", "Risks"));
          const list = el("div", "risk-list");
          idea.risks.forEach((item) => {
            const row = el("div", "risk-item");
            row.appendChild(el("strong", "", item.risk || "Risk"));
            if (item.mitigation) row.appendChild(el("div", "", `Mitigation: ${item.mitigation}`));
            list.appendChild(row);
          });
          wrap.appendChild(list);
          card.appendChild(wrap);
        }

        if ((idea.validation_sprint || []).length) {
          const wrap = el("section", "section-stack");
          wrap.appendChild(el("h4", "", "7-day validation sprint"));
          const list = el("div", "timeline");
          idea.validation_sprint.forEach((item) => {
            const row = el("div", "timeline-item");
            row.appendChild(el("strong", "", `Day ${item.day || "?"}`));
            row.appendChild(el("div", "", item.task || ""));
            list.appendChild(row);
          });
          wrap.appendChild(list);
          card.appendChild(wrap);
        }

        if (idea.gtm) {
          const wrap = el("section", "section-stack");
          wrap.appendChild(el("h4", "", "GTM wedge"));
          if (idea.gtm.wedge) wrap.appendChild(el("p", "", idea.gtm.wedge));
          appendList(wrap, idea.gtm.channels || []);
          if (idea.gtm.first_ten_users) wrap.appendChild(el("p", "", `First ten users: ${idea.gtm.first_ten_users}`));
          if (idea.gtm.message_angle) wrap.appendChild(el("p", "", `Message angle: ${idea.gtm.message_angle}`));
          card.appendChild(wrap);
        }

        ideasRoot.appendChild(card);
      });

      const winner = (REPORT_DATA.ideas || []).find((idea) => idea.slug === REPORT_DATA.recommended_winner) ||
        (REPORT_DATA.ideas || []).find((idea) => idea.status === "winner");
      const winnerSummary = qs("winner-summary");
      if (winner) {
        [
          ["Winner", winner.name],
          ["Why it won", winner.why_it_wins],
          ["Why crypto matters", winner.why_crypto_is_necessary],
        ].forEach(([label, value]) => {
          const row = el("div", "meta-item");
          row.appendChild(el("strong", "", label));
          row.appendChild(el("div", "", value || ""));
          winnerSummary.appendChild(row);
        });
      } else {
        winnerSummary.appendChild(el("div", "meta-item", "No winner provided."));
      }
    </script>
  </body>
</html>
