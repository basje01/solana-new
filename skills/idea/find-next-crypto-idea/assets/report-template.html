<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>__TITLE__</title>
    <style>
      :root {
        --bg: #f5f0e8;
        --panel: rgba(255, 252, 247, 0.92);
        --panel-strong: #fffaf2;
        --ink: #17120b;
        --muted: #5e5346;
        --line: rgba(23, 18, 11, 0.12);
        --accent: #c2551a;
        --accent-soft: rgba(194, 85, 26, 0.12);
        --success: #235c33;
        --warn: #8b5b12;
        --shadow: 0 18px 50px rgba(40, 28, 18, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(194, 85, 26, 0.12), transparent 28%),
          radial-gradient(circle at right 20%, rgba(35, 92, 51, 0.1), transparent 22%),
          linear-gradient(180deg, #f9f5ed 0%, var(--bg) 100%);
      }

      .shell {
        width: min(1160px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 32px 0 56px;
      }

      .hero,
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 24px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
      }

      .hero {
        padding: 28px;
      }

      .hero h1 {
        margin: 0 0 10px;
        font-size: clamp(2rem, 4vw, 3.4rem);
        line-height: 0.94;
        max-width: 9ch;
      }

      .hero p {
        margin: 0;
        max-width: 60ch;
        color: var(--muted);
        font-size: 1rem;
      }

      .hero-meta {
        margin-top: 18px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        padding: 8px 12px;
        font-size: 0.9rem;
      }

      .grid {
        display: grid;
        grid-template-columns: 1.05fr 1.4fr;
        gap: 20px;
        margin-top: 20px;
      }

      .panel {
        padding: 22px;
      }

      .panel h2,
      .panel h3 {
        margin: 0 0 14px;
        font-family: "Avenir Next Condensed", "Franklin Gothic Medium", sans-serif;
        letter-spacing: 0.02em;
      }

      .panel h2 {
        font-size: 1.25rem;
      }

      .meta-list,
      .idea-list,
      .checklist,
      .risk-list,
      .timeline {
        display: grid;
        gap: 12px;
      }

      .meta-item,
      .answer-item,
      .check-item,
      .risk-item,
      .timeline-item,
      .comp-item {
        padding: 14px 16px;
        border-radius: 18px;
        background: var(--panel-strong);
        border: 1px solid var(--line);
      }

      .meta-item strong,
      .answer-item strong,
      .risk-item strong,
      .timeline-item strong,
      .comp-item strong {
        display: block;
        font-family: "Avenir Next Condensed", "Franklin Gothic Medium", sans-serif;
        margin-bottom: 6px;
      }

      .idea-card {
        padding: 18px;
        border-radius: 22px;
        background: var(--panel-strong);
        border: 1px solid var(--line);
        display: grid;
        gap: 14px;
      }

      .idea-card.winner {
        border-color: rgba(194, 85, 26, 0.4);
        box-shadow: inset 0 0 0 1px rgba(194, 85, 26, 0.16);
      }

      .idea-head {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: start;
      }

      .idea-head h3 {
        margin: 0;
        font-size: 1.35rem;
      }

      .idea-sub {
        color: var(--muted);
      }

      .badge {
        border-radius: 999px;
        padding: 7px 10px;
        background: rgba(23, 18, 11, 0.06);
        font-size: 0.84rem;
        white-space: nowrap;
      }

      .badge.winner {
        background: var(--accent);
        color: white;
      }

      .section-stack {
        display: grid;
        gap: 10px;
      }

      .section-stack h4 {
        margin: 0;
        font-family: "Avenir Next Condensed", "Franklin Gothic Medium", sans-serif;
        letter-spacing: 0.02em;
      }

      .section-stack p,
      .section-stack ul {
        margin: 0;
        color: var(--muted);
      }

      .section-stack ul {
        padding-left: 18px;
      }

      .score-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .score {
        border-radius: 12px;
        padding: 8px 10px;
        background: rgba(35, 92, 51, 0.08);
        color: var(--success);
        font-size: 0.88rem;
      }

      .wide {
        margin-top: 20px;
      }

      .footer-note {
        margin-top: 20px;
        color: var(--muted);
        font-size: 0.92rem;
      }

      @media (max-width: 900px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <h1 id="report-title"></h1>
        <p id="report-subtitle"></p>
        <div class="hero-meta" id="hero-meta"></div>
      </section>

      <section class="grid">
        <article class="panel">
          <h2>User Context</h2>
          <div class="meta-list" id="context-summary"></div>
        </article>

        <article class="panel">
          <h2>Clarifying Answers</h2>
          <div class="meta-list" id="clarifying-answers"></div>
        </article>
      </section>

      <section class="panel wide">
        <h2 id="ideas-heading">Top Ideas</h2>
        <div class="idea-list" id="ideas"></div>
      </section>

      <section class="panel wide">
        <h2>Why The Winner Wins</h2>
        <div class="meta-list" id="winner-summary"></div>
      </section>

      <p class="footer-note">
        Generated from structured JSON. Offline-safe and meant to be reviewed outside chat.
      </p>
    </main>

    <script>
      const REPORT_DATA = __DATA_JSON__;

      const qs = (id) => document.getElementById(id);

      function el(tag, className, text) {
        const node = document.createElement(tag);
        if (className) node.className = className;
        if (text !== undefined && text !== null) node.textContent = text;
        return node;
      }

      function appendList(container, items) {
        if (!items || !items.length) return;
        const ul = el("ul");
        items.forEach((item) => ul.appendChild(el("li", "", item)));
        container.appendChild(ul);
      }

      qs("report-title").textContent = REPORT_DATA.title || "Find Next Crypto Idea";
      qs("report-subtitle").textContent =
        REPORT_DATA.report_type === "deep-dive"
          ? "Deep dive on the selected crypto startup idea."
          : "Shortlist of the three most defensible crypto ideas based on the interview and fresh research.";

      const meta = qs("hero-meta");
      [
        REPORT_DATA.report_type || "shortlist",
        REPORT_DATA.generated_at || "",
        REPORT_DATA.recommended_winner ? `winner: ${REPORT_DATA.recommended_winner}` : "",
      ]
        .filter(Boolean)
        .forEach((value) => meta.appendChild(el("span", "chip", value)));

      const summary = qs("context-summary");
      (REPORT_DATA.user_context?.summary || []).forEach((item) => {
        summary.appendChild(el("div", "meta-item", item));
      });
      if (!summary.children.length) {
        summary.appendChild(el("div", "meta-item", "No user context summary provided."));
      }

      const answers = qs("clarifying-answers");
      (REPORT_DATA.user_context?.clarifying_answers || []).forEach((item) => {
        const wrap = el("div", "answer-item");
        wrap.appendChild(el("strong", "", item.question || "Question"));
        wrap.appendChild(el("div", "", item.answer || ""));
        answers.appendChild(wrap);
      });
      if (!answers.children.length) {
        answers.appendChild(el("div", "answer-item", "No clarifying answers captured."));
      }

      const ideas = REPORT_DATA.ideas || [];
      qs("ideas-heading").textContent = `Top ${ideas.length || 0} Idea${ideas.length === 1 ? "" : "s"}`;

      const ideasRoot = qs("ideas");
      ideas.forEach((idea) => {
        const card = el("article", `idea-card ${idea.status === "winner" ? "winner" : ""}`.trim());

        const head = el("div", "idea-head");
        const left = el("div");
        left.appendChild(el("h3", "", idea.name || "Untitled idea"));
        left.appendChild(el("div", "idea-sub", idea.one_liner || ""));
        head.appendChild(left);
        head.appendChild(el("span", `badge ${idea.status === "winner" ? "winner" : ""}`.trim(), idea.status || `rank ${idea.rank || ""}`));
        card.appendChild(head);

        const scoreRow = el("div", "score-row");
        Object.entries(idea.scores || {}).forEach(([key, value]) => {
          scoreRow.appendChild(el("span", "score", `${key}: ${value}`));
        });
        if (scoreRow.children.length) card.appendChild(scoreRow);

        const blocks = [
          ["Why it wins", idea.why_it_wins],
          ["Why crypto is necessary", idea.why_crypto_is_necessary],
          ["Kill this idea", idea.kill_this_idea],
          ["Why not Web2", idea.why_not_web2],
        ];
        blocks.forEach(([title, body]) => {
          if (!body) return;
          const wrap = el("section", "section-stack");
          wrap.appendChild(el("h4", "", title));
          wrap.appendChild(el("p", "", body));
          card.appendChild(wrap);
        });

        if ((idea.competitors || []).length) {
          const wrap = el("section", "section-stack");
          wrap.appendChild(el("h4", "", "Competitors and substitutes"));
          const compList = el("div", "meta-list");
          idea.competitors.forEach((item) => {
            const row = el("div", "comp-item");
            row.appendChild(el("strong", "", `${item.name || "Unknown"}${item.type ? ` · ${item.type}` : ""}`));
            if (item.signal) row.appendChild(el("div", "", item.signal));
            if (item.why_they_have_not_won) row.appendChild(el("div", "", `Why they have not won: ${item.why_they_have_not_won}`));
            compList.appendChild(row);
          });
          wrap.appendChild(compList);
          card.appendChild(wrap);
        }

        if ((idea.oss_landscape || []).length) {
          const wrap = el("section", "section-stack");
          wrap.appendChild(el("h4", "", "OSS landscape"));
          const list = el("div", "meta-list");
          idea.oss_landscape.forEach((item) => {
            const row = el("div", "comp-item");
            row.appendChild(el("strong", "", item.name || "Unknown repo"));
            if (item.signal) row.appendChild(el("div", "", item.signal));
            if (item.notes) row.appendChild(el("div", "", item.notes));
            list.appendChild(row);
          });
          wrap.appendChild(list);
          card.appendChild(wrap);
        }

        if ((idea.mvp_checklist || []).length) {
          const wrap = el("section", "section-stack");
          wrap.appendChild(el("h4", "", "2-week MVP"));
          const list = el("div", "checklist");
          idea.mvp_checklist.forEach((item) => {
            list.appendChild(el("div", "check-item", `□ ${item}`));
          });
          wrap.appendChild(list);
          card.appendChild(wrap);
        }

        if ((idea.risks || []).length) {
          const wrap = el("section", "section-stack");
          wrap.appendChild(el("h4", "", "Risks"));
          const list = el("div", "risk-list");
          idea.risks.forEach((item) => {
            const row = el("div", "risk-item");
            row.appendChild(el("strong", "", item.risk || "Risk"));
            if (item.mitigation) row.appendChild(el("div", "", `Mitigation: ${item.mitigation}`));
            list.appendChild(row);
          });
          wrap.appendChild(list);
          card.appendChild(wrap);
        }

        if ((idea.validation_sprint || []).length) {
          const wrap = el("section", "section-stack");
          wrap.appendChild(el("h4", "", "7-day validation sprint"));
          const list = el("div", "timeline");
          idea.validation_sprint.forEach((item) => {
            const row = el("div", "timeline-item");
            row.appendChild(el("strong", "", `Day ${item.day || "?"}`));
            row.appendChild(el("div", "", item.task || ""));
            list.appendChild(row);
          });
          wrap.appendChild(list);
          card.appendChild(wrap);
        }

        if (idea.gtm) {
          const wrap = el("section", "section-stack");
          wrap.appendChild(el("h4", "", "GTM wedge"));
          if (idea.gtm.wedge) wrap.appendChild(el("p", "", idea.gtm.wedge));
          appendList(wrap, idea.gtm.channels || []);
          if (idea.gtm.first_ten_users) wrap.appendChild(el("p", "", `First ten users: ${idea.gtm.first_ten_users}`));
          if (idea.gtm.message_angle) wrap.appendChild(el("p", "", `Message angle: ${idea.gtm.message_angle}`));
          card.appendChild(wrap);
        }

        ideasRoot.appendChild(card);
      });

      const winner = ideas.find((idea) => idea.slug === REPORT_DATA.recommended_winner) ||
        ideas.find((idea) => idea.status === "winner");
      const winnerSummary = qs("winner-summary");
      if (winner) {
        [
          ["Winner", winner.name],
          ["Why it won", winner.why_it_wins],
          ["Why crypto matters", winner.why_crypto_is_necessary],
        ].forEach(([label, value]) => {
          const row = el("div", "meta-item");
          row.appendChild(el("strong", "", label));
          row.appendChild(el("div", "", value || ""));
          winnerSummary.appendChild(row);
        });
      } else {
        winnerSummary.appendChild(el("div", "meta-item", "No winner provided."));
      }
    </script>
  </body>
</html>
